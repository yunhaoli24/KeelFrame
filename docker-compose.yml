networks:
  fba_network:
    name: fba_network
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.10.10.0/24

volumes:
  fba_postgres:
    name: fba_postgres
  fba_redis:
    name: fba_redis
  fba_rabbitmq:
    name: fba_rabbitmq
  fba_prometheus_data:
    name: fba_prometheus_data
  fba_rustfs_data:
    name: fba_rustfs_data

services:
  fba_server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: fba_server:latest
    ports:
      - "8001:8001"
    container_name: fba_server
    restart: always
    env_file:
      - ./deploy/backend/docker-compose/.env.server
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - fba_postgres
      - fba_redis
      - fba_rustfs
    volumes:
      - ./deploy/backend/docker-compose/.env.server:/fba/backend/backend/.env
    networks:
      - fba_network
    command:
      - bash
      - -c
      - |
        wait-for-it -s fba_postgres:5432 -s fba_redis:6379 -t 300
        fba migrate
        supervisord -c /etc/supervisor/supervisord.conf
        supervisorctl restart

  fba_ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SERVER_API_URL: ${VITE_SERVER_API_URL:-http://localhost:8002}
        VITE_SERVER_API_PREFIX: ${VITE_SERVER_API_PREFIX:-/api/v1}
        VITE_SERVER_API_TIMEOUT: ${VITE_SERVER_API_TIMEOUT:-5000}
    image: fba_ui:latest
    ports:
      - "8002:80"
    container_name: fba_ui
    restart: always
    depends_on:
      - fba_server
    networks:
      - fba_network

  fba_postgres:
    image: postgres:16
    ports:
      - "${DOCKER_POSTGRES_MAP_PORT:-5432}:5432"
    container_name: fba_postgres
    restart: always
    environment:
      POSTGRES_DB: fba
      POSTGRES_PASSWORD: 123456
      TZ: Asia/Shanghai
    volumes:
      - fba_postgres:/var/lib/postgresql/data
    networks:
      - fba_network
    command:
      - postgres
      - -c
      - log_min_messages=error
      - -c
      - client_min_messages=error

  fba_redis:
    image: redis
    ports:
      - "${DOCKER_REDIS_MAP_PORT:-6379}:6379"
    container_name: fba_redis
    restart: always
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - fba_redis:/data
    networks:
      - fba_network
    command:
      - redis-server
      - --loglevel
      - warning

  fba_rustfs_init:
    image: alpine:3.22
    container_name: fba_rustfs_init
    user: root
    command:
      - sh
      - -c
      - |
        mkdir -p /data/rustfs0 /data/rustfs1 /data/rustfs2 /data/rustfs3
        chown -R 10001:10001 /data
    volumes:
      - fba_rustfs_data:/data
    networks:
      - fba_network
    restart: "no"

  fba_rustfs:
    image: rustfs/rustfs:latest
    container_name: fba_rustfs
    restart: always
    depends_on:
      fba_rustfs_init:
        condition: service_completed_successfully
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_VOLUMES=/data/rustfs{0..3}
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-ChangeMe123!}
      - RUSTFS_UNSAFE_BYPASS_DISK_CHECK=true
      - RUSTFS_OBS_LOGGER_LEVEL=error
    volumes:
      - fba_rustfs_data:/data
    networks:
      - fba_network
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  fba_rustfs_bucket_init:
    image: minio/mc:latest
    container_name: fba_rustfs_bucket_init
    restart: "no"
    depends_on:
      fba_rustfs:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set rustfs http://fba_rustfs:9000 ${RUSTFS_ACCESS_KEY:-rustfsadmin} ${RUSTFS_SECRET_KEY:-ChangeMe123!}
        mc mb --ignore-existing rustfs/${OBJECT_STORAGE_DEFAULT_BUCKET:-fba-static}
        mc anonymous set download rustfs/${OBJECT_STORAGE_DEFAULT_BUCKET:-fba-static}
    networks:
      - fba_network

  fba_rabbitmq:
    hostname: fba_rabbitmq
    image: rabbitmq:3.13.7
    ports:
      - "15672:15672"
      - "5672:5672"
    container_name: fba_rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - ./deploy/backend/rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/90-fba-log-level.conf:ro
      - fba_rabbitmq:/var/lib/rabbitmq
    networks:
      - fba_network

  fba_celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - SERVER_TYPE=fba_celery_worker
    image: fba_celery_worker:latest
    # 如果你需要分布式部署 Worker，则必须移除此 container_name 配置
    container_name: fba_celery_worker
    restart: always
    env_file:
      - ./deploy/backend/docker-compose/.env.server
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - fba_rabbitmq
    volumes:
      - ./deploy/backend/docker-compose/.env.server:/fba/backend/backend/.env
    networks:
      - fba_network
    command:
      - bash
      - -c
      - |
        wait-for-it -s fba_rabbitmq:5672 -t 300
        supervisord -c /etc/supervisor/supervisord.conf
        supervisorctl restart

  fba_celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - SERVER_TYPE=fba_celery_beat
    image: fba_celery_beat:latest
    container_name: fba_celery_beat
    restart: always
    env_file:
      - ./deploy/backend/docker-compose/.env.server
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - fba_rabbitmq
      - fba_celery_worker
    volumes:
      - ./deploy/backend/docker-compose/.env.server:/fba/backend/backend/.env
    networks:
      - fba_network
    command:
      - bash
      - -c
      - |
        wait-for-it -s fba_rabbitmq:5672 -t 300
        supervisord -c /etc/supervisor/supervisord.conf
        supervisorctl restart

  fba_celery_flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - SERVER_TYPE=fba_celery_flower
    image: fba_celery_flower:latest
    ports:
      - "8555:8555"
    container_name: fba_celery_flower
    restart: always
    env_file:
      - ./deploy/backend/docker-compose/.env.server
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - fba_rabbitmq
      - fba_celery_worker
    volumes:
      - ./deploy/backend/docker-compose/.env.server:/fba/backend/backend/.env
    networks:
      - fba_network
    command:
      - bash
      - -c
      - |
        wait-for-it -s fba_rabbitmq:5672 -t 300
        supervisord -c /etc/supervisor/supervisord.conf
        supervisorctl restart

  fba_celery_exporter:
    image: danihodovic/celery-exporter:0.12.2
    restart: always
    ports:
      - "9808:9808"
    container_name: fba_celery_exporter
    environment:
      - CE_BROKER_URL=amqp://guest:guest@fba_rabbitmq:5672//
    depends_on:
      - fba_rabbitmq
    networks:
      - fba_network
    command:
      - --broker-url=amqp://guest:guest@fba_rabbitmq:5672//
      - --log-level=ERROR

  fba_loki:
    image: grafana/loki:3.7.1
    restart: always
    ports:
      - "3100:3100"
    container_name: fba_loki
    networks:
      - fba_network
    command:
      - -config.file=/etc/loki/local-config.yaml
      - -log.level=error

  fba_prometheus:
    image: prom/prometheus:v3.11.3
    restart: always
    ports:
      - "9090:9090"
    container_name: fba_prometheus
    depends_on:
      - fba_loki
    volumes:
      - ./deploy/backend/grafana/fba_prometheus.yml:/workspace/fba_prometheus.yml
      - fba_prometheus_data:/prometheus
    networks:
      - fba_network
    command:
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --config.file=/workspace/fba_prometheus.yml
      - --log.level=error

  fba_alloy:
    image: grafana/alloy:v1.16.1
    restart: always
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"
    container_name: fba_alloy
    depends_on:
      - fba_loki
    volumes:
      - ./deploy/backend/grafana/fba_config.alloy:/etc/alloy/fba_config.alloy
    networks:
      - fba_network
    command:
      - run
      - /etc/alloy/fba_config.alloy
      - --server.http.listen-addr=0.0.0.0:12345

  fba_tempo:
    image: grafana/tempo:2.10.5
    restart: always
    ports:
      - "3200:3200"
    expose:
      - 4317
      - 4318
    container_name: fba_tempo
    depends_on:
      - fba_loki
    volumes:
      - ./deploy/backend/grafana/fba_tempo.yml:/etc/tempo/fba_tempo.yml
    networks:
      - fba_network
    command:
      - -config.file=/etc/tempo/fba_tempo.yml
      - -auth.enabled=false
      - -log.level=error

  fba_grafana:
    image: grafana/grafana:13.0.1
    restart: always
    ports:
      - "3000:3000"
    container_name: fba_grafana
    depends_on:
      - fba_loki
      - fba_prometheus
    volumes:
      - ./deploy/backend/grafana/fba_grafana.ini:/etc/grafana/grafana.ini
      - ./deploy/backend/grafana/dashboards/fba_celery.json:/etc/grafana/dashboards/fba_celery.json
      - ./deploy/backend/grafana/dashboards/fba_server.json:/etc/grafana/dashboards/fba_server.json
      - ./deploy/backend/grafana/fba_dashboards.yml:/etc/grafana/provisioning/dashboards/fba_dashboards.yml
      - ./deploy/backend/grafana/fba_datasource.yml:/etc/grafana/provisioning/datasources/fba_datasource.yml
    networks:
      - fba_network
