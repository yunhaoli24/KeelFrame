default_language_version:
    python: '>= 3.10'

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
        args:
          - '--fix'
          - '--unsafe-fixes'

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types_or: [python]
        pass_filenames: false
        args: [backend]

      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types_or: [python]
        pass_filenames: false
        args:
          - --threads=4
          - backend

      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types_or: [python]
        pass_filenames: false
        args: [backend]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        args:
          - tests
          - --cov=backend
          - --cov-report=term-missing
          - --cov-fail-under=50

      - id: uv-lock
        name: uv lock
        entry: uv lock
        language: system
        pass_filenames: false

      - id: uv-export
        name: uv export
        entry: uv export
        language: system
        pass_filenames: false
        args:
          - '-o'
          - 'requirements.txt'
          - '--no-hashes'
