name: Backend Lint

on:
  pull_request:
    paths:
      - backend/**
      - .github/workflows/backend-lint.yml
  push:
    branches:
      - master
    paths:
      - backend/**
      - .github/workflows/backend-lint.yml

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fba
          POSTGRES_PASSWORD: 123456
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fba"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      UV_CACHE_DIR: /tmp/.uv-cache
      TEE_API_TOKEN: test-token
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-backend-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-backend-
            uv-${{ runner.os }}-
      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            backend/.mypy_cache
            backend/.ruff_cache
            backend/.pytest_cache
          key: lint-${{ runner.os }}-backend-${{ hashFiles('backend/uv.lock', 'backend/ruff.toml') }}
          restore-keys: |
            lint-${{ runner.os }}-backend-
      - name: Prepare backend env
        run: cp backend/.env.example backend/.env
      - name: Start object storage
        env:
          MINIO_ROOT_USER: rustfsadmin
          MINIO_ROOT_PASSWORD: ChangeMe123!
        run: |
          docker run -d \
            --name fba-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            quay.io/minio/minio:latest server /data

          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:9000/minio/health/ready; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs fba-minio
              exit 1
            fi
            sleep 2
          done

          docker run --rm --network host \
            --entrypoint /bin/sh \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            minio/mc:latest -c '
              mc alias set local http://127.0.0.1:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" &&
              mc mb --ignore-existing local/fba-static &&
              mc anonymous set download local/fba-static
            '
      - name: Run backend migrations
        run: uv run fba migrate
      - name: Run backend lint checks
        run: bash pre-commit.sh
